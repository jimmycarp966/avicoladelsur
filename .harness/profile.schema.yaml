$schema: "https://json-schema.org/draft/2020-12/schema"
title: Harness Profile Schema
type: object
required:
  - version
  - repo
  - branches
  - qa
  - guardrails
  - maintenance
  - pr
properties:
  version:
    type: integer
    minimum: 1
  repo:
    type: object
    required:
      - name
      - default_branch
    properties:
      name:
        type: string
        minLength: 1
      default_branch:
        type: string
        minLength: 1
      root:
        type: string
      docs_root:
        type: string
  branches:
    type: object
    required:
      - protected
      - prefix
      - mode
    properties:
      protected:
        type: array
        minItems: 0
        items:
          type: string
      prefix:
        type: string
        minLength: 1
      mode:
        type: string
        enum:
          - ask-before-create
          - fail
          - auto-create
          - main-only
  qa:
    type: object
    required:
      - commands
    properties:
      stop_on_failure:
        type: boolean
      timeout_seconds:
        type: integer
        minimum: 1
      commands:
        type: object
        required:
          - lint
          - typecheck
          - test
          - smoke
        properties:
          lint:
            type: string
            minLength: 1
          typecheck:
            type: string
            minLength: 1
          test:
            type: string
            minLength: 1
          smoke:
            type: string
            minLength: 1
  guardrails:
    type: object
    required:
      - require_human_confirmation_for
      - blocked_command_patterns
    properties:
      require_human_confirmation_for:
        type: array
        minItems: 3
        items:
          type: string
      blocked_command_patterns:
        type: array
        items:
          type: string
  maintenance:
    type: object
    required:
      - schedule
      - command
    properties:
      retention_days:
        type: integer
        minimum: 1
      command:
        type: string
        minLength: 1
      schedule:
        type: object
        required:
          - type
          - day
          - time
        properties:
          type:
            type: string
          day:
            type: string
          time:
            type: string
  pr:
    type: object
    required:
      - required_checks
      - output_dir
    properties:
      output_dir:
        type: string
        minLength: 1
      required_checks:
        type: array
        minItems: 1
        items:
          type: string
additionalProperties: true
